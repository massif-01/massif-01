name: Metrics
on:
  # 每天运行一次
  schedule: [{cron: "0 0 * * *"}]
  # 允许手动触发
  workflow_dispatch:
  # 推送到 main 分支时运行
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 生成 followup.user 插件 - 用户视角的 issues 和 PR 跟进
      - name: Generate followup user metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.followup.user.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_followup: yes
          plugin_followup_sections: user
          
      # 生成 followup.indepth 插件 - 深度分析的 issues 和 PR 统计
      - name: Generate followup indepth metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.followup.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_followup_indepth: yes

      # 生成 contributors.categories 插件 - 贡献者分类统计
      - name: Generate contributors categories metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.contributors.categories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_contributors: yes
          plugin_contributors_categories: |
            {
              "📚 Documentation": ["README.md", "docs/**"],
              "💻 Code": ["src/**", "lib/**"],
              "🎨 Style": ["*.css", "*.scss"],
              "#️⃣ Others": ["*"]
            }

      # 生成 contributors.contributions 插件 - 贡献者贡献详情
      - name: Generate contributors contributions metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.contributors.contributions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_contributors: yes
          plugin_contributors_contributions: yes

      # 生成 achievements.compact 插件 - 成就徽章（紧凑模式）
      - name: Generate achievements compact metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

      # 生成 leetcode 插件 - LeetCode 统计
      - name: Generate LeetCode metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.leetcode.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: .user.login
          plugin_leetcode_sections: solved, skills, recent
