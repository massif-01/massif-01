name: Metrics
on:
  schedule:
    # 每小时运行一次
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # 生成的SVG文件名
          filename: github-metrics.svg
          # 使用GitHub token（需要创建secret）
          token: ${{ secrets.METRICS_TOKEN }}
          # 可选：添加更多配置
          # 例如：启用某些插件
          # plugin_achievements: yes
          # plugin_languages: yes
          # plugin_stargazers: yes
